<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聚合音乐搜索</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; margin: 20px 0; font-weight: 300; }
        .search-box { display: flex; margin-bottom: 30px; }
        .search-box input { flex: 1; padding: 12px 16px; font-size: 16px; border: 1px solid #ddd; border-radius: 24px 0 0 24px; outline: none; }
        .search-box button { padding: 12px 24px; background: #1db954; color: white; border: none; border-radius: 0 24px 24px 0; font-size: 16px; cursor: pointer; }
        .song-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .song-title { font-size: 18px; font-weight: 600; }
        .song-artist { color: #666; margin: 4px 0 12px; }
        .platform-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .platform-btn { display: inline-flex; align-items: center; padding: 8px 14px; border-radius: 20px; text-decoration: none; font-size: 14px; font-weight: 500; color: white; transition: 0.2s; }
        .netease { background: #ec4141; }
        .qq { background: #31c27c; }
        .kugou { background: #2a93e2; }
        .spotify { background: #1db954; }
        .unavailable { background: #e0e0e0; color: #999; cursor: not-allowed; }
        .empty-state { text-align: center; color: #999; margin-top: 60px; }
        footer { text-align: center; margin-top: 40px; padding: 20px; color: #aaa; font-size: 12px; }
        .loading { text-align: center; color: #666; margin: 20px; }
        .error-msg { color: #e74c3c; text-align: center; margin: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 聚合音乐搜索</h1>
        <div class="search-box">
            <input type="text" id="keyword" placeholder="输入歌名、歌手..." autofocus>
            <button onclick="search()">搜索</button>
        </div>
        <div id="results"></div>
        <footer>本工具仅聚合公开搜索结果，不提供音频播放 | 最终播放请使用官方App</footer>
    </div>

    <script>
        const CORS_PROXY = 'https://music.1175199461.workers.dev/?url=';

        async function fetchWithProxy(url) {
            try {
                const directResp = await fetch(url);
                if (directResp.ok) return directResp;
            } catch (e) {}
            const proxyUrl = CORS_PROXY + encodeURIComponent(url);
            const resp = await fetch(proxyUrl);
            if (!resp.ok) throw new Error(`代理请求失败: ${resp.status}`);
            return resp;
        }

        // 通用有效性校验：不是纯数字、标题长度≥2、歌手不空
        function isValidMusicEntry(title, artist) {
            if (!title || !artist) return false;
            // 去掉括号内容后判断是否为纯数字或单字符
            const cleanTitle = title.replace(/（[^）]*）/g, '').replace(/\([^)]*\)/g, '').trim();
            if (/^\d+$/.test(cleanTitle) || cleanTitle.length < 2) return false;
            return true;
        }

        // 网易云
        async function searchNetease(keyword) {
            const url = `https://music.163.com/api/search/get?type=1&s=${encodeURIComponent(keyword)}&limit=10`;
            const resp = await fetchWithProxy(url);
            const data = await resp.json();
            if (data.code === 200 && Array.isArray(data.result.songs)) {
                return data.result.songs
                    .filter(song => song.id && song.name && song.artists && song.artists.length > 0)
                    .map(song => ({
                        platform: 'netease',
                        platform_name: '网易云',
                        id: String(song.id),
                        title: song.name,
                        artist: song.artists.map(a => a.name).join('/'),
                        album: song.album ? song.album.name : ''
                    }))
                    .filter(song => isValidMusicEntry(song.title, song.artist))  // 增强过滤
                    .map(song => Object.assign(song, {
                        url_scheme: `orpheus://song/${song.id}`,
                        url_web: `https://music.163.com/song?id=${song.id}`
                    }));
            }
            return [];
        }

        // QQ音乐
        async function searchQQ(keyword) {
            const url = `https://c.y.qq.com/soso/fcgi-bin/client_search_cp?p=1&n=10&w=${encodeURIComponent(keyword)}&format=json`;
            const resp = await fetchWithProxy(url);
            const data = await resp.json();
            if (data.code === 0 && Array.isArray(data.data.song.list)) {
                return data.data.song.list
                    .filter(song => song.songmid && song.songname && song.singer && song.singer.length > 0)
                    .map(song => ({
                        platform: 'qq',
                        platform_name: 'QQ音乐',
                        id: song.songmid,
                        title: song.songname,
                        artist: song.singer.map(s => s.name).join('/'),
                        album: song.albumname || ''
                    }))
                    .filter(song => isValidMusicEntry(song.title, song.artist))
                    .map(song => Object.assign(song, {
                        url_scheme: `qqmusic://qq.com/media/playSong?mid=${song.id}`,
                        url_web: `https://y.qq.com/n/ryqq/songDetail/${song.id}`
                    }));
            }
            return [];
        }

        // 酷狗
        async function searchKugou(keyword) {
            const url = `http://mobilecdn.kugou.com/api/v3/search/song?format=json&keyword=${encodeURIComponent(keyword)}&page=1&pagesize=10&showtype=1`;
            const resp = await fetchWithProxy(url);
            const data = await resp.json();
            if (data.status === 1 && Array.isArray(data.data.info)) {
                return data.data.info
                    .filter(song => song.hash && song.songname)
                    .map(song => ({
                        platform: 'kugou',
                        platform_name: '酷狗',
                        id: song.hash,
                        title: song.songname,
                        artist: song.singername || '',
                        album: song.album_name || ''
                    }))
                    .filter(song => isValidMusicEntry(song.title, song.artist))
                    .map(song => Object.assign(song, {
                        url_scheme: `kugou://song/${song.id}`,
                        url_web: `https://www.kugou.com/song/#hash=${song.id}&album_id=${song.album_id || ''}`
                    }));
            }
            return [];
        }

        function normalize(text) {
            return text.toLowerCase()
                .replace(/（[^）]*）/g, '')
                .replace(/\([^)]*\)/g, '')
                .replace(/\s+/g, '');
        }

        function aggregate(allResults) {
            const map = {};
            for (const list of allResults) {
                for (const song of list) {
                    const key = normalize(song.title) + '|' + normalize(song.artist);
                    if (map[key]) {
                        map[key].platforms.push(song);
                    } else {
                        map[key] = {
                            title: song.title,
                            artist: song.artist,
                            album: song.album,
                            platforms: [song]
                        };
                    }
                }
            }
            return Object.values(map).sort((a, b) => b.platforms.length - a.platforms.length);
        }

        async function search() {
            const kw = document.getElementById('keyword').value.trim();
            if (!kw) return;
            document.getElementById('results').innerHTML = '<div class="loading">搜索中...</div>';

            try {
                const results = await Promise.allSettled([
                    searchNetease(kw),
                    searchQQ(kw),
                    searchKugou(kw)
                ]);
                const validResults = results
                    .filter(r => r.status === 'fulfilled')
                    .map(r => r.value);
                const aggregated = aggregate(validResults);
                render(aggregated.slice(0, 20));
            } catch (e) {
                document.getElementById('results').innerHTML = '<div class="error-msg">搜索失败，请稍后重试</div>';
            }
        }

        function render(songs) {
            const container = document.getElementById('results');
            if (!songs.length) {
                container.innerHTML = '<div class="empty-state">没有找到相关歌曲</div>';
                return;
            }
            let html = '';
            songs.forEach(song => {
                html += `<div class="song-card">
                    <div class="song-title">${escapeHtml(song.title)}</div>
                    <div class="song-artist">${escapeHtml(song.artist)} · ${escapeHtml(song.album)}</div>
                    <div class="platform-tags">`;
                ['netease', 'qq', 'kugou', 'spotify'].forEach(plat => {
                    const found = song.platforms.find(p => p.platform === plat);
                    if (found) {
                        html += `<a href="#" class="platform-btn ${plat}" 
                                  onclick="tryScheme(event, '${found.url_scheme}', '${found.url_web}')">
                                  ${found.platform_name}
                                 </a>`;
                    } else {
                        html += `<span class="platform-btn unavailable">${getPlatName(plat)}</span>`;
                    }
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
        }

        function getPlatName(key) {
            return { netease: '网易云', qq: 'QQ音乐', kugou: '酷狗', spotify: 'Spotify' }[key] || key;
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function tryScheme(e, scheme, webUrl) {
            e.preventDefault();
            window.location.href = scheme;
            setTimeout(() => {
                window.open(webUrl, '_blank');
            }, 2000);
        }

        document.getElementById('keyword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
